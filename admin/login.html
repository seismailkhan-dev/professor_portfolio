<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Professor Portal</title>
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <style>
    body { background: var(--navy); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 100%; max-width: 400px; padding: 1.5rem; }
    .login-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-brand .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 26px; font-weight: 600;
      color: var(--navy);
      margin: 0 auto 16px;
    }
    .login-brand h1 {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 500;
      color: var(--navy);
    }
    .login-brand p {
      font-size: 13px; color: var(--text-muted); margin-top: 4px;
    }
    .login-form .form-group { margin-bottom: 1.1rem; }
    .login-submit { width: 100%; padding: 11px; font-size: 14px; margin-top: 0.5rem; }
    .login-error {
      background: rgba(192,57,43,0.08);
      border: 1px solid rgba(192,57,43,0.2);
      color: var(--danger);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
    }
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 12px;
      color: var(--text-muted);
    }
    /* Background decoration */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(30,53,84,0.8) 0%, transparent 50%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo">P</div>
        <h1>Professor Portal</h1>
        <p>Sign in to manage your academic presence</p>
      </div>

      <div class="login-error" id="loginError">
        Incorrect email or password. Please try again.
      </div>

      <div class="login-form">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="emailInput" class="form-control" placeholder="professor@university.edu" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="passwordInput" class="form-control" placeholder="••••••••" />
        </div>
        <button class="btn btn-gold login-submit" id="loginBtn" onclick="handleLogin()">
          Sign In
        </button>
      </div>

      <div class="login-footer">
        Forgot your password? <a href="mailto:admin@example.com" style="color:var(--navy);font-weight:500">Contact support</a>
      </div>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ---- CONFIG ----
    const SUPABASE_URL = 'https://tsosrdntzybtcijgjwlk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_23hymXGOQ4yR02pBk8ndwQ_ux_Dnz8z';

    // ---- Init client ----
    let _sbClient = null;

    function getClient() {
      if (_sbClient) return _sbClient;
      if (!window.supabase || typeof window.supabase.createClient !== 'function') {
        throw new Error('Supabase SDK not loaded from CDN. Check your internet connection.');
      }
      _sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      return _sbClient;
    }

    // ---- Check existing session ----
    (async () => {
      try {
        const client = getClient();
        const { data } = await client.auth.getSession();
        if (data.session) window.location.href = 'index.html';
      } catch (e) {
        console.warn('Session check skipped:', e.message);
      }
    })();

    // ---- Handle Login ----
    async function handleLogin() {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');

      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = 'Signing in...';
      errEl.style.display = 'none';

      try {
        const client = getClient();
        const { data, error } = await client.auth.signInWithPassword({ email, password });

        if (error) {
          console.error('Auth error:', error);
          errEl.textContent = error.message || 'Incorrect email or password.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = 'Sign In';
          return;
        }

        console.log('Login successful, redirecting...');
        window.location.href = 'index.html';
      } catch (err) {
        console.error('Login exception:', err);
        errEl.textContent = err.message || 'An unexpected error occurred. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
